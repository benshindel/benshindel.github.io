<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - Cookbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/cookbook.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ site.favicon | default: '/assets/images/favicon.png' | relative_url }}">
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.addEventListener("DOMContentLoaded", function() {
        document.body.classList.add("dark-mode");
      });
    }
  </script>
</head>
<body>
  <a href="{{ '/cookbook/' | relative_url }}" class="recipe-back">&larr; Cookbook</a>
  <div class="recipe-page">
    <h1>{{ page.title }}</h1>
    {% if page.tags.size > 0 %}
    <div class="recipe-tags">
      {% for tag in page.tags %}
      <span class="recipe-tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
    <div class="recipe-content">
      {{ content }}
    </div>
    {% if page.source %}
    <div class="recipe-source">
      {% if page.source_url %}
        Source: <a href="{{ page.source_url }}" target="_blank" rel="noopener">{{ page.source }}</a>
      {% else %}
        Source: {{ page.source }}
      {% endif %}
    </div>
    {% endif %}
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var saved = localStorage.getItem("theme");
      if (saved === "dark") document.body.classList.add("dark-mode");
    });
  </script>
</body>
</html>
