<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - Cookbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/cookbook.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ site.favicon | default: '/assets/images/favicon.png' | relative_url }}">
  <script src="{{ '/assets/js/darkmode.js' | relative_url }}" defer></script>
</head>
<body>
  <div class="cookbook-header">
    <a href="{{ '/cookbook/' | relative_url }}" class="recipe-back">&larr; Cookbook</a>
    <button id="mode-toggle" aria-label="Toggle dark mode">
      <span class="toggle-icon"></span>
    </button>
  </div>
  <div class="recipe-page">
    <h1>{{ page.title }}</h1>
    <div class="recipe-content">
      {{ content }}
    </div>
    {% if page.source %}
    <div class="recipe-source">
      {% if page.source_url %}
        Source: <a href="{{ page.source_url }}" target="_blank" rel="noopener">{{ page.source }}</a>
      {% else %}
        Source: {{ page.source }}
      {% endif %}
    </div>
    {% endif %}
  </div>
</body>
</html>
