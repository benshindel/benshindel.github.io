<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - Cookbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/cookbook.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ site.favicon | default: '/assets/images/favicon.png' | relative_url }}">
  <script>
    // Apply saved dark mode preference immediately to prevent flash
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.style.colorScheme = "dark";
      document.addEventListener("DOMContentLoaded", function() {
        document.body.classList.add("dark-mode");
      });
    }
  </script>
</head>
<body>
  <div class="cookbook-header">
    <h1>{{ page.title | default: "Cookbook" }}</h1>
    <button class="cookbook-toggle" id="mode-toggle" aria-label="Toggle dark mode">
      <span id="toggle-label">&#9789;</span>
    </button>
  </div>
  {{ content }}
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var saved = localStorage.getItem("theme");
      if (saved === "dark") document.body.classList.add("dark-mode");
      var btn = document.getElementById("mode-toggle");
      var label = document.getElementById("toggle-label");
      function updateLabel() {
        label.innerHTML = document.body.classList.contains("dark-mode") ? "&#9788;" : "&#9789;";
      }
      updateLabel();
      btn.addEventListener("click", function() {
        document.body.classList.toggle("dark-mode");
        localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
        updateLabel();
      });
    });
  </script>
</body>
</html>
